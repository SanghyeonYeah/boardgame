<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>에너지 변형 체스 · 보드게임 아레나</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/env.js"></script>
  <style>
    .cboard { display: grid; grid-template-columns: repeat(8, 56px); grid-template-rows: repeat(8, 56px); border: 2px solid #2e3b54; border-radius: 8px; overflow: hidden; width: max-content; }
    .csq { width: 56px; height: 56px; position: relative; display: flex; align-items: center; justify-content: center; font-size: 38px; cursor: pointer; user-select: none; line-height: 1; }
    .csq.light { background: #cdd6e6; }
    .csq.dark { background: #5b6c8a; }
    .csq .glyph.w { color: #fff; text-shadow: 0 1px 2px #0008, 0 0 1px #000; }
    .csq .glyph.b { color: #1a1a1a; text-shadow: 0 1px 1px #fff6; }
    .csq.field-E::before { content: '⚡'; position: absolute; top: 2px; left: 3px; font-size: 13px; opacity: .85; }
    .csq.field-T::before { content: '💱'; position: absolute; top: 2px; left: 3px; font-size: 13px; opacity: .85; }
    .csq.sel { box-shadow: inset 0 0 0 3px #4ade80; }
    .csq.move::after { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: rgba(74,222,128,.55); }
    .csq.cap::after { width: 48px; height: 48px; border-radius: 50%; background: transparent; border: 4px solid rgba(248,113,113,.7); box-sizing: border-box; }
    .ebar { height: 14px; background: var(--bg); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .ebar > div { height: 100%; background: linear-gradient(90deg, #facc15, #4ade80); transition: width .2s; }
    .side { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .ep { padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px; background: var(--bg); }
    .ep.turn { outline: 2px solid var(--accent); }
    .ep .who { font-weight: 700; }
    .ep .en { font-family: ui-monospace, monospace; font-size: 20px; }
    .layout { display: grid; grid-template-columns: auto 320px; gap: 18px; align-items: start; }
    @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } .cboard { grid-template-columns: repeat(8, 40px); grid-template-rows: repeat(8, 40px); } .csq { width: 40px; height: 40px; font-size: 27px; } }
    .modal { position: fixed; inset: 0; background: #0008; display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal .box { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 18px; }
    .promo-row { display: flex; gap: 8px; font-size: 34px; }
    .promo-row button { font-size: 30px; padding: 6px 10px; }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="brand">GAIA<span class="dot">·</span>ARENA</span>
    <span class="spacer"></span>
    <a class="back" href="/">← 홈으로</a>
  </div>

  <div class="wrap">
    <h1>♟️ 에너지 변형 체스</h1>
    <div id="lobby"></div>

    <div id="game" class="hidden">
      <div class="banner info" id="roomBanner"></div>
      <div class="layout">
        <div>
          <div class="side">
            <div class="ep" id="epTop"><div class="who"></div><div class="en"></div><div class="ebar"><div></div></div></div>
            <div class="ep" id="epBot"><div class="who"></div><div class="en"></div><div class="ebar"><div></div></div></div>
          </div>
          <div class="cboard" id="cboard"></div>
          <div class="row" style="margin-top:12px">
            <span class="muted small">⚡ 에너지 필드: 충전 · 💱 거래소: 협상</span>
          </div>
        </div>
        <div>
          <div class="panel">
            <h3 id="turnTitle">대기 중</h3>
            <div id="tradeBox"></div>
          </div>
          <div class="panel">
            <h3>기록</h3>
            <div class="log" id="log"></div>
          </div>
        </div>
      </div>
      <div id="overBox"></div>
    </div>
  </div>

  <div id="promoModal" class="modal hidden">
    <div class="box">
      <h3>승급할 기물 선택</h3>
      <div class="promo-row" id="promoRow"></div>
    </div>
  </div>

  <script type="module" src="/games/chess/chess.js"></script>
</body>
</html>
