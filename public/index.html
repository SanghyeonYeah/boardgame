<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>보드게임 대시보드</title>
    <style>
        .hidden { display: none; }
        .grid { display: grid; grid-template-columns: repeat(17, 30px); gap: 2px; }
        .cell { width: 30px; height: 30px; border: 1px solid #ccc; text-align: center; line-height: 30px; }
    </style>
</head>
<body>

    <div id="lobby-screen">
        <h1>🎲 보드게임 대기실</h1>
        <button id="btn-create">방 만들기</button>
        <hr>
        <input type="text" id="input-code" placeholder="방 코드 입력">
        <button id="btn-join">방 입장하기</button>
    </div>

    <div id="game-screen" class="hidden">
        <h2>🎮 게임 방: <span id="display-room-code"></span></h2>
        <p>최근 이벤트: <span id="display-event"></span></p>
        
        <div id="board" class="grid"></div>
        
        <br>
        <button id="btn-action">게임 액션 테스트 (턴 진행 등)</button>
    </div>

    <script>
        let currentRoomCode = null;

        // [방 만들기 버튼 이벤트]
        document.getElementById('btn-create').addEventListener('click', async () => {
            try {
                const res = await fetch('/api/create-room', { method: 'POST' });
                const data = await res.json();
                
                if (data.roomCode) {
                    alert(`방이 생성되었습니다! 코드: ${data.roomCode}`);
                    enterGameScreen(data.roomCode, data.data);
                } else {
                    alert('방 생성 실패: ' + data.error);
                }
            } catch (err) {
                console.error(err);
                alert('네트워크 에러 발생');
            }
        });

        // [게임 화면 전환 및 데이터 렌더링]
        function enterGameScreen(roomCode, roomData) {
            currentRoomCode = roomCode;
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('display-room-code').innerText = roomCode;
            document.getElementById('display-event').innerText = roomData.last_event;

            // 17x17 맵 그리기 로직 (예시)
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let y = 0; y < 17; y++) {
                for (let x = 0; x < 17; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    // 자원이 있는 좌표라면 표시
                    const hasResource = roomData.map_resources.some(r => r.x === x && r.y === y);
                    if (hasResource) cell.style.backgroundColor = '#ffd700';
                    board.appendChild(cell);
                }
            }
        }

        // [게임 액션 보낼 때 - api/game-action 호출]
        document.getElementById('btn-action').addEventListener('click', async () => {
            if (!currentRoomCode) return;
            
            const res = await fetch('/api/game-action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roomCode: currentRoomCode, action: 'MOVE' })
            });
            const data = await res.json();
            alert(data.message || data.error);
        });
    </script>
</body>
</html>
