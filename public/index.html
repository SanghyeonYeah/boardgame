<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보드게임 방 생성 테스트</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        button {
            background-color: #0070f3;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0051cb;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            background-color: #fafafa;
            border: 1px solid #eee;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            display: none;
        }
        .success { color: #2e7d32; border-color: #a5d6a7 !important; background-color: #e8f5e9 !important; }
        .error { color: #c62828; border-color: #ef9a9a !important; background-color: #ffebee !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎲 보드게임 관리자</h1>
    <p>아래 버튼을 누르면 새로운 게임 방이 생성됩니다.</p>
    <button id="createBtn">새로운 방 만들기</button>
    <div id="result"></div>
</div>

<script>
    document.getElementById('createBtn').addEventListener('click', async () => {
        const btn = document.getElementById('createBtn');
        const resultDiv = document.getElementById('result');
        
        // 버튼 비활성화 및 상태 표시
        btn.disabled = true;
        btn.innerText = '방 생성 중...';
        resultDiv.style.display = 'none';
        resultDiv.className = '';

        try {
            // 💡 중요: 메서드를 명확하게 POST로 지정하여 호출합니다.
            const response = await fetch('/api/create-room', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            });

            const data = await response.json();

            resultDiv.style.display = 'block';
            if (response.ok) {
                resultDiv.classList.add('success');
                resultDiv.innerText = `✅ 방 생성 성공!\n\n방 코드: ${data.roomCode}\n\n[서버 응답 데이터]\n${JSON.stringify(data, null, 2)}`;
            } else {
                resultDiv.classList.add('error');
                resultDiv.innerText = `❌ 에러 발생 (${response.status})\n\n${JSON.stringify(data, null, 2)}`;
            }
        } catch (error) {
            resultDiv.style.display = 'block';
            resultDiv.classList.add('error');
            resultDiv.innerText = `🚨 네트워크 에러:\n${error.message}`;
        } finally {
            // 버튼 원래대로 복구
            btn.disabled = false;
            btn.innerText = '새로운 방 만들기';
        }
    });
</script>

</body>
</html>
